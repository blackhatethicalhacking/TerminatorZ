#!/bin/bash
#############################################################################
# TerminatorZ v3.0 - Payload Configuration
# Bash 3.2+ compatible — uses functions instead of associative arrays.
#############################################################################

# Unique per-run canaries
export TZ_CANARY_DOMAIN="tz-canary-$$.invalid"
export TZ_CANARY_STRING="tz7canary$$x7tz"
export TZ_CANARY_XSS="tz7<svg/onload=1>x7tz$$"
export TZ_CANARY_CMD="tzcmd$$marker"

# Ordered list of checks (drives [nn/31] counter, total = 31)
export TZ_CHECK_ORDER=(
    "SQLI"
    "XSS"
    "SSTI"
    "LFI"
    "RFI"
    "SSRF"
    "XXE"
    "SHELLSHOCK"
    "CMD_INJECTION"
    "LOG4J"
    "CSRF"
    "OPEN_REDIRECT"
    "HOST_HEADER"
    "CLICKJACKING"
    "CORS"
    "SENSITIVE_DATA"
    "IDOR"
    "GRAPHQL"
    "JWT_NONE"
    "WEB_CACHE_POISON"
    "OAUTH_MISC"
    "NOSQL"
    "AI_PROMPT_INJECTION"
    "MISSING_HEADERS"
    "SRI_MISSING"
    "HTTP_PLAINTEXT"
    "DIR_LISTING"
    "SERVER_DISCLOSURE"
    "ADMIN_EXPOSED"
    "GIT_EXPOSED"
    "ENV_EXPOSED"
)

# Severity lookup (function — bash 3.2 compatible)
tz_severity() {
    case "$1" in
        SQLI|SSTI|SHELLSHOCK|CMD_INJECTION|LOG4J|NOSQL|GIT_EXPOSED|ENV_EXPOSED)
            echo "CRITICAL" ;;
        LFI|RFI|SSRF|XXE|JWT_NONE|OAUTH_MISC|IDOR|SENSITIVE_DATA|ADMIN_EXPOSED)
            echo "HIGH" ;;
        XSS|CSRF|OPEN_REDIRECT|CORS|GRAPHQL|WEB_CACHE_POISON|AI_PROMPT_INJECTION|SRI_MISSING|DIR_LISTING)
            echo "MEDIUM" ;;
        HOST_HEADER|CLICKJACKING|MISSING_HEADERS|HTTP_PLAINTEXT|SERVER_DISCLOSURE)
            echo "LOW" ;;
        *)
            echo "LOW" ;;
    esac
}

# Display name lookup (function)
tz_display_name() {
    case "$1" in
        SQLI)                 echo "SQL Injection" ;;
        XSS)                  echo "Reflected XSS" ;;
        SSTI)                 echo "Server-Side Template Injection" ;;
        LFI)                  echo "Local File Inclusion" ;;
        RFI)                  echo "Remote File Inclusion" ;;
        SSRF)                 echo "Server-Side Request Forgery" ;;
        XXE)                  echo "XML External Entity" ;;
        SHELLSHOCK)           echo "Shellshock RCE" ;;
        CMD_INJECTION)        echo "Command Injection" ;;
        LOG4J)                echo "Log4Shell (CVE-2021-44228)" ;;
        CSRF)                 echo "Missing CSRF Protection" ;;
        OPEN_REDIRECT)        echo "Open Redirect" ;;
        HOST_HEADER)          echo "Host Header Injection" ;;
        CLICKJACKING)         echo "Clickjacking (no frame protection)" ;;
        CORS)                 echo "CORS Misconfiguration" ;;
        SENSITIVE_DATA)       echo "Sensitive Data Exposure" ;;
        IDOR)                 echo "Insecure Direct Object Reference" ;;
        GRAPHQL)              echo "GraphQL Introspection Enabled" ;;
        JWT_NONE)             echo "JWT None Algorithm" ;;
        WEB_CACHE_POISON)     echo "Web Cache Poisoning" ;;
        OAUTH_MISC)           echo "OAuth Redirect Misconfiguration" ;;
        NOSQL)                echo "NoSQL Injection" ;;
        AI_PROMPT_INJECTION)  echo "AI Prompt Injection" ;;
        MISSING_HEADERS)      echo "Missing Security Headers" ;;
        SRI_MISSING)          echo "Missing Subresource Integrity" ;;
        HTTP_PLAINTEXT)       echo "HTTP Plaintext Exposure" ;;
        DIR_LISTING)          echo "Directory Listing Enabled" ;;
        SERVER_DISCLOSURE)    echo "Server Version Disclosure" ;;
        ADMIN_EXPOSED)        echo "Admin Panel Exposed" ;;
        GIT_EXPOSED)          echo ".git Directory Exposed" ;;
        ENV_EXPOSED)          echo ".env File Exposed" ;;
        *)                    echo "$1" ;;
    esac
}

# Severity colour lookup (function; colours defined in ui.sh)
tz_sev_color() {
    case "$1" in
        CRITICAL) echo "$NEON_RED" ;;
        HIGH)     echo "$NEON_ORANGE" ;;
        MEDIUM)   echo "$NEON_YELLOW" ;;
        LOW)      echo "$NEON_CYAN" ;;
        *)        echo "$NEON_WHITE" ;;
    esac
}

# Redirect param names (open redirect / oauth checks)
export TZ_REDIRECT_PARAMS=(
    "redirect" "url" "next" "returnUrl" "return_url" "returnTo" "return_to"
    "dest" "destination" "r" "u" "redirect_uri" "redirectUri" "callback"
)

# High-confidence secret patterns
export TZ_SECRET_PATTERNS=(
    'AKIA[0-9A-Z]{16}'
    'AIza[0-9A-Za-z_-]{35}'
    'sk_live_[0-9a-zA-Z]{24,}'
    'ghp_[0-9a-zA-Z]{36}'
    'gho_[0-9a-zA-Z]{36}'
    'xox[baprs]-[0-9a-zA-Z-]{10,}'
    '-----BEGIN (RSA |OPENSSH |EC |DSA |PGP )?PRIVATE KEY-----'
    'eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'
)

# Common admin paths
export TZ_ADMIN_PATHS=(
    "/admin" "/administrator" "/wp-admin" "/phpmyadmin"
    "/adminer.php" "/manager/html" "/console"
)

export -f tz_severity tz_display_name tz_sev_color
